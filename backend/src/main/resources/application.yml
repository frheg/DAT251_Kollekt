spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kollekt}
    username: ${SPRING_DATASOURCE_USERNAME:kollekt}
    password: ${SPRING_DATASOURCE_PASSWORD:kollekt}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: kollekt-backend
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt-secret: ${APP_SECURITY_JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-chars}
    token-validity-seconds: ${APP_SECURITY_TOKEN_VALIDITY_SECONDS:3600}
    refresh-token-validity-seconds: ${APP_SECURITY_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}
  topics:
    task-events: task-events
    chat-events: chat-events
    economy-events: economy-events
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/google-calendar/callback}
    frontend-url: ${GOOGLE_FRONTEND_URL:http://localhost:5173}
