spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:kollekt_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  data:
    redis:
      repositories:
        enabled: false
  kafka:
    listener:
      auto-startup: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

# Minimal app properties so beans can resolve in the test context.
app:
  topics:
    task-events: task-events
    chat-events: chat-events
    economy-events: economy-events
  security:
    jwt-secret: test-jwt-secret-that-is-at-least-32-characters-long
    token-validity-seconds: 3600
    refresh-token-validity-seconds: 1209600
  cors:
    allowed-origins: http://localhost:5173
