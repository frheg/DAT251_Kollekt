spring:
  datasource:
    url: jdbc:h2:mem:kollekt_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  data:
    redis:
      repositories:
        enabled: false
  kafka:
    admin:
      enabled: false
    listener:
      auto-startup: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# Minimal app topic properties so beans depending on them can resolve.
app:
  topics:
    task-events: task-events
    chat-events: chat-events
    economy-events: economy-events
